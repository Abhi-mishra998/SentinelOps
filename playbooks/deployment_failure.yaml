name: deployment_failure_investigation
version: "1.0"
incident_type: deployment_failure
timeout_seconds: 45

steps:
  - id: collected_evidence
    action: infrastructure.evidence_collector.collect_full_evidence
    args:
      namespace: "{{ namespace }}"
      pod_name: "{{ pod_name }}"

  - id: check_pattern
    action: agent.pattern_layer.check
    args:
      evidence: "{{ collected_evidence }}"
    on_match: return_immediately

  - id: analyze_root_cause
    action: ai.root_cause_engine.analyze
    args:
      evidence: "{{ collected_evidence }}"
